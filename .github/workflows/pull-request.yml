name: Pull Request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Python linting tools
        run: pip install black isort

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run lint checks
        run: make lint-check

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    env:
      MOCK_AUTH: 'true'
      SUPABASE_URL: 'http://localhost:54321'
      SUPABASE_KEY: 'test-key'
      OPENROUTER_API_KEY: 'test-key'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests with coverage
        run: make test-unit-coverage

      - name: Upload unit test coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: |
            backend/coverage-unit.xml
            backend/coverage-unit-html/
          retention-days: 7

  e2e-test:
    name: E2E Tests
    needs: lint
    runs-on: ubuntu-latest
    environment: integration
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      BASE_URL: http://localhost:4001
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: make install-ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Create E2E test environment file
        run: |
          mkdir -p .ai
          cat > .ai/.env.test << EOF
          PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          E2E_USERNAME=${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD=${{ secrets.E2E_PASSWORD }}
          BASE_URL=http://localhost:4001
          EOF

      - name: Create frontend environment file
        run: |
          cat > frontend/.env << EOF
          PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      - name: Run E2E tests
        run: make e2e-ci

      - name: Upload E2E test report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: e2e-report
          path: |
            playwright-report/
            e2e-results.json
          retention-days: 7

      - name: Upload E2E test traces
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: e2e-traces
          path: test-results/
          retention-days: 7

  status-comment:
    name: PR Status Comment
    needs: [lint, unit-test, e2e-test]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download unit test coverage
        uses: actions/download-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit

      - name: Download E2E report
        uses: actions/download-artifact@v7
        with:
          name: e2e-report
          path: e2e-report

      - name: Generate status comment
        id: generate-comment
        run: |
          # Extract coverage percentage from XML if available
          COVERAGE_PERCENT="N/A"
          if [ -f coverage-unit/coverage-unit.xml ]; then
            COVERAGE_PERCENT=$(grep -oP 'line-rate="\K[^"]+' coverage-unit/coverage-unit.xml | head -1 | awk '{printf "%.1f%%", $1 * 100}')
          fi

          # Generate comment body
          cat << EOF > comment.md
          ## ✅ Pull Request Checks Passed

          All CI checks have completed successfully!

          ### 📊 Test Results Summary

          | Check | Status |
          |-------|--------|
          | 🔍 Linting | ✅ Passed |
          | 🧪 Unit Tests | ✅ Passed |
          | 🎭 E2E Tests | ✅ Passed |

          ### 📈 Coverage

          - **Unit Test Coverage**: ${COVERAGE_PERCENT}

          ### 📁 Artifacts

          - Unit test coverage report
          - E2E test HTML report

          ---
          *Generated by GitHub Actions workflow*
          EOF

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          cat comment.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-status
          message: ${{ steps.generate-comment.outputs.comment }}
