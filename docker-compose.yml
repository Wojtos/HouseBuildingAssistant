services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homebuild-backend
    ports:
      - "5001:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 5001 --reload
    networks:
      - homebuild-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: homebuild-frontend
    ports:
      - "4001:4001"
    environment:
      - PUBLIC_SUPABASE_URL=${SUPABASE_URL:-}
      - PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 4001
    networks:
      - homebuild-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  homebuild-network:
    driver: bridge

